<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#111111">
  <title>Page not found — PactRide</title>
  <link rel="stylesheet" href="/PactRide/assets/styles.css">
  <style>
    .not-found { min-height: 100vh; display: grid; place-items: center; padding: 2rem; }
    .not-found-card { width: min(100%, 900px); padding: clamp(2rem, 7vw, 6rem); border: 1px solid var(--line); border-radius: 30px; background: var(--white); }
    .not-found-code { margin: 0; font-size: .72rem; font-weight: 780; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); }
    .not-found h1 { margin: 1rem 0 1.3rem; font-size: clamp(3.2rem, 9vw, 7rem); line-height: .92; letter-spacing: -.075em; }
    .not-found-copy { max-width: 650px; color: var(--muted); font-size: 1.05rem; }
    .not-found-actions { display: flex; flex-wrap: wrap; gap: .7rem; margin-top: 2rem; }
  </style>
</head>
<body>
  <main class="not-found" id="main">
    <section class="not-found-card">
      <p class="not-found-code">Error 404</p>
      <h1>This route is not part of the protocol.</h1>
      <p class="not-found-copy">Return to the PactRide landing page or continue into the public specification, research issues, and governance documents on GitHub.</p>
      <div class="not-found-actions">
        <a class="button button-dark" href="/PactRide/">PactRide home <span aria-hidden="true">→</span></a>
        <a class="button button-outline" href="https://github.com/wpggLabs/PactRide">GitHub repository</a>
      </div>
    </section>
  </main>
</body>
</html>
